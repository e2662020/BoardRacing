<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luckysheet Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-mousewheel@3.1.13/jquery.mousewheel.min.js"></script>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/assets/iconfont/iconfont.css' />
  <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #luckysheet {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="luckysheet"></div>
  <script>
    // 接收父窗口消息
    window.addEventListener('message', function(e) {
      const { type, data } = e.data;
      
      if (type === 'init') {
        // 初始化Luckysheet
        const config = {
          container: 'luckysheet',
          title: data.title || '数据表',
          lang: 'zh',
          showtoolbar: data.readOnly !== true,
          showinfobar: false,
          showsheetbar: true,
          showstatisticBar: true,
          sheetBottomConfig: false,
          allowEdit: data.readOnly !== true,
          enableAddRow: data.readOnly !== true,
          enableAddBackTop: data.readOnly !== true,
          data: data.sheetData || [{
            name: 'Sheet1',
            color: '',
            status: 1,
            order: 0,
            celldata: data.celldata || [],
            config: {},
            index: 0,
          }],
          hook: {
            cellUpdated: function() {
              sendDataToParent();
            },
            rangeSelect: function(range) {
              if (range && range.length > 0) {
                parent.postMessage({
                  type: 'rangeSelect',
                  data: range[0]
                }, '*');
              }
            },
            cellMousedown: function(cell, position) {
              parent.postMessage({
                type: 'cellSelect',
                data: {
                  row: position.r,
                  col: position.c,
                  value: luckysheet.getCellValue(position.r, position.c)
                }
              }, '*');
            }
          }
        };
        
        luckysheet.create(config);
      }
      
      if (type === 'updateData') {
        // 更新数据
        if (luckysheet && data.celldata) {
          luckysheet.setSheetAdd({
            sheetObject: {
              name: 'Sheet1',
              color: '',
              status: 1,
              order: 0,
              celldata: data.celldata,
              config: {},
              index: 0,
            }
          });
        }
      }
      
      if (type === 'getData') {
        sendDataToParent();
      }
    });
    
    function sendDataToParent() {
      if (luckysheet) {
        const sheetData = luckysheet.getAllSheets();
        parent.postMessage({
          type: 'dataChange',
          data: sheetData
        }, '*');
      }
    }
    
    // 通知父窗口iframe已加载
    parent.postMessage({ type: 'ready' }, '*');
  </script>
</body>
</html>
